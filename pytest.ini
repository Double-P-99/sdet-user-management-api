[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra
markers =
    api: endpoint-focused API behavior tests
    contract: contract-focused API tests
    isolation: environment-isolation tests
    regression: regression coverage for expected API behavior
    security: authentication and authorization coverage
    smoke: critical happy-path coverage
    unit: fast framework-level unit tests without live API calls
    tc_id(id): traceability marker that maps automated tests to documented test-case IDs
    e2e_id(id): traceability marker that maps automated tests to documented basic E2E workflow IDs
